version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: careerpilot-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careerpilot-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/careerpilot
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=9a4f2c8d3b7a1e5f9g2h3j4k5l6m7n8o9p0q1r2s3t4u5v6w7x8y9z0a1b2c3d4e
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careerpilot-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
