# Server configuration
server.port=8080

# Spring MongoDB configuration
# For local dev: uses localhost MongoDB (Compass)
# For production: set SPRING_DATA_MONGODB_URI environment variable in Render dashboard
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/careerpilot}

# Multipart File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT details for Spring Security
jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e5f9g2h3j4k5l6m7n8o9p0q1r2s3t4u5v6w7x8y9z0a1b2c3d4e}
# Token lifespan: 1 day (in milliseconds)
jwt.expiration=86400000

# Gemini API Integration
# Set GEMINI_API_KEY as environment variable in Render dashboard
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
